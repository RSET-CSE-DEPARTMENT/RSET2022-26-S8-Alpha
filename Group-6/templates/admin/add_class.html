{% extends "base.html" %}
{% block title %}Add New Class{% endblock %}

{% block content %}
<div class="dashboard-header">
    <h1>Add New Class</h1>
    <a href="{{ url_for('admin_classes') }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="card auth-card" style="max-width: 600px; margin: 0 auto;">
    <form method="POST">
        <div class="form-group">
            <label>Class Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Advanced AI" required>
        </div>
        <div class="form-group">
            <label>Department</label>
            <select name="department" class="form-control" required>
                {% for dept in departments %}
                <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Semester</label>
            <input type="number" name="semester" class="form-control" min="1" max="8" value="1">
        </div>
        <div class="form-group">
            <label>Assign Faculty</label>
            <select name="faculty_id" class="form-control">
                <option value="">-- No Faculty Assigned --</option>
                {% for f in faculty %}
                <option value="{{ f.id }}">{{ f.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Class</button>
    </form>
</div>
{% endblock %}
