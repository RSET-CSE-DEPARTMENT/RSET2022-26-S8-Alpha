<!DOCTYPE html>
<html>
<head>
    <title>Add New Task</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            opacity: 0.3;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
        }
        
        h2 {
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            font-weight: 700;
        }
        
        form, .btn-secondary {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.1);
            padding: 0.75rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            display: inline-block;
            background: rgba(255,255,255,0.95);
            color: #667eea;
            border: 2px solid #667eea;
            padding: 0.5rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-3">Add New Task</h2>
    <form method="post" id="taskForm">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Add Task</button>
    </form>
    <a href="{% url 'todo_list' %}" class="btn btn-secondary mt-3">Back to To-Do List</a>
</div>

<script>
    // Set minimum date/time to current date/time on page load
    document.addEventListener('DOMContentLoaded', function() {
        const dueDateInput = document.querySelector('input[name="due_date"]');
        if (dueDateInput) {
            // Get current date and time in local timezone
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
            dueDateInput.setAttribute('min', minDateTime);
            
            // Validate on form submission
            document.getElementById('taskForm').addEventListener('submit', function(e) {
                const selectedDate = new Date(dueDateInput.value);
                const currentDate = new Date();
                
                if (selectedDate < currentDate) {
                    e.preventDefault();
                    alert('Due date cannot be in the past. Please select a current or future date.');
                    dueDateInput.focus();
                }
            });
        }
    });
</script>
</body>
</html>
